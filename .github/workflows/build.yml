name: Build and Package Applications

on:
  push:
    branches:
      - main
      - feature/code-restructure
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ttkbootstrap reportlab python-docx matplotlib pandas openpyxl qrcode pywinstyles Pillow pyodbc

      - name: Build Executable
        run: |
          pyinstaller --noconfirm QuotationGenerator.spec

      - name: Setup Inno Setup
        run: |
          # Inno Setup is pre-installed on GitHub Windows runners at C:\Program Files (x86)\Inno Setup 6\
          echo "Inno Setup is ready."

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" QuotationGenerator.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuotationGenerator-Windows-Setup
          path: installer_output/QuotationGenerator_Setup_v5.2.exe

  build-mac:
    name: Build macOS Application
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # We omit pywinstyles and pyodbc on Mac as they are Windows specific
          pip install pyinstaller ttkbootstrap reportlab python-docx matplotlib pandas openpyxl qrcode Pillow

      - name: Build macOS App Bundle
        run: |
          # Build using PyInstaller
          pyinstaller --noconfirm \
            --windowed \
            --name="QuotationGenerator" \
            --icon="logo.jpeg" \
            --add-data="templates:templates" \
            --add-data="logo.jpeg:." \
            --hidden-import="PIL.ImageTk" \
            --hidden-import="PIL.Image" \
            --hidden-import="openpyxl" \
            --hidden-import="qrcode" \
            --hidden-import="ttkbootstrap" \
            --hidden-import="reportlab" \
            --hidden-import="docx" \
            --hidden-import="matplotlib" \
            --hidden-import="pandas" \
            src/quotation.py

      - name: Compress macOS Application into ZIP
        run: |
          cd dist
          zip -r ../QuotationGenerator-macOS.zip QuotationGenerator.app

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuotationGenerator-macOS-Portable
          path: QuotationGenerator-macOS.zip

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: QuotationGenerator-Windows-Setup
          path: ./artifacts

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: QuotationGenerator-macOS-Portable
          path: ./artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/QuotationGenerator_Setup_v5.2.exe
            ./artifacts/QuotationGenerator-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
