name: Build and Package Applications

on:
  push:
    branches:
      - main
      - feature/code-restructure
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ttkbootstrap reportlab python-docx matplotlib pandas openpyxl qrcode pywinstyles Pillow pyodbc

      - name: Build Executable
        run: |
          pyinstaller --noconfirm QuotationGenerator.spec

      - name: Setup Inno Setup
        run: |
          # Inno Setup is pre-installed on GitHub Windows runners at C:\Program Files (x86)\Inno Setup 6\
          echo "Inno Setup is ready."

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" QuotationGenerator.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuotationGenerator-Windows-Setup
          path: installer_output/QuotationGenerator_Setup_v5.2.exe

  build-mac:
    name: Build macOS Application
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # We omit pywinstyles and pyodbc on Mac as they are Windows specific
          pip install pyinstaller ttkbootstrap reportlab python-docx matplotlib pandas openpyxl qrcode Pillow

      - name: Build macOS App Bundle
        run: |
          # Build using PyInstaller
          pyinstaller --noconfirm \
            --windowed \
            --name="QuotationGenerator" \
            --icon="logo.jpeg" \
            --add-data="templates:templates" \
            --add-data="logo.jpeg:." \
            --paths="src" \
            --paths="src/components" \
            --paths="src/features" \
            --paths="src/themes" \
            --paths="src/models" \
            --paths="src/utils" \
            --hidden-import="PIL.ImageTk" \
            --hidden-import="PIL.Image" \
            --hidden-import="openpyxl" \
            --hidden-import="qrcode" \
            --hidden-import="ttkbootstrap" \
            --hidden-import="reportlab" \
            --hidden-import="docx" \
            --hidden-import="matplotlib" \
            --hidden-import="pandas" \
            --hidden-import="config" \
            --hidden-import="dashboard" \
            --hidden-import="invoice" \
            --hidden-import="commercial" \
            --hidden-import="delivery_challan" \
            --hidden-import="analytics" \
            --hidden-import="generator" \
            --hidden-import="scrapper" \
            --hidden-import="whatsapp_bot" \
            --hidden-import="insta_scraper" \
            --hidden-import="ui_styles" \
            --hidden-import="theme_manager" \
            --hidden-import="invoice_selector" \
            --hidden-import="commercial_selector" \
            --hidden-import="delivery_selector" \
            src/quotation.py

      - name: Ad-hoc Code Sign App Bundle
        run: |
          # Unsigned bundles are killed on Apple Silicon and flagged by Gatekeeper.
          # An ad-hoc signature (-s -) makes the binary valid without a paid Developer ID.
          codesign --force --deep --sign - dist/QuotationGenerator.app
          codesign --verify --verbose dist/QuotationGenerator.app

      - name: Compress macOS Application into ZIP
        run: |
          # Use ditto (Apple's archiver), NOT `zip`. ditto preserves the bundle's
          # internal symlinks, executable permission bit, and resource forks.
          # Plain `zip` + Archive Utility corrupts the bundle -> "can't be opened".
          ditto -c -k --sequesterRsrc --keepParent \
            dist/QuotationGenerator.app QuotationGenerator-macOS.zip

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuotationGenerator-macOS-Portable
          path: QuotationGenerator-macOS.zip

  create-release:
    name: Publish Public Release Assets
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: QuotationGenerator-Windows-Setup
          path: ./artifacts

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: QuotationGenerator-macOS-Portable
          path: ./artifacts

      - name: Validate publishing configuration
        env:
          PUBLIC_DOWNLOADS_REPO: ${{ vars.PUBLIC_DOWNLOADS_REPO }}
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$PUBLIC_DOWNLOADS_REPO" ]; then
            echo "::error::Missing repository variable PUBLIC_DOWNLOADS_REPO (format: owner/repo)."
            exit 1
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Missing secret PUBLIC_REPO_TOKEN."
            exit 1
          fi

      - name: Create or update release in public downloads repository
        env:
          PUBLIC_DOWNLOADS_REPO: ${{ vars.PUBLIC_DOWNLOADS_REPO }}
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" --repo "$PUBLIC_DOWNLOADS_REPO" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --repo "$PUBLIC_DOWNLOADS_REPO" \
              --title "Quotation Generator $TAG" \
              --notes "Automated binaries published from private source repository."

          gh release upload "$TAG" \
            ./artifacts/QuotationGenerator_Setup_v5.2.exe \
            ./artifacts/QuotationGenerator-macOS.zip \
            --repo "$PUBLIC_DOWNLOADS_REPO" \
            --clobber
